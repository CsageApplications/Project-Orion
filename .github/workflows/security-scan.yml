name: Security Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Detect exposed secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits in a push

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  env-file-check:
    name: Ensure .env files are not tracked
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed .env files
        run: |
          FOUND=$(git ls-files | grep -E '(^|/)\.env$' || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Committed .env file(s) detected:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No .env files are tracked."

      - name: Check for API key patterns in tracked files
        run: |
          PATTERNS=(
            'sk-ant-api[0-9A-Za-z_-]{20,}'
            'sk_[0-9a-f]{40}'
            'ELEVENLABS_API_KEY\s*=\s*[A-Za-z0-9_-]{10,}'
            'ANTHROPIC_API_KEY\s*=\s*[A-Za-z0-9_-]{10,}'
            'OPENAI_API_KEY\s*=\s*sk-[A-Za-z0-9_-]{20,}'
            'JWT_SECRET\s*=\s*(?!change_me|dev_secret)[A-Za-z0-9_-]{10,}'
          )

          FAILED=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -rE "$pattern" -- ':!*.example' ':!*.md' ':!.github' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "❌ Potential secret found matching pattern: $pattern"
              echo "$MATCHES"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "✅ No hardcoded secrets detected in tracked files."

  gitignore-check:
    name: Validate .gitignore covers sensitive paths
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required gitignore entries
        run: |
          REQUIRED=(
            "\.env"
            "\.env\.local"
            "node_modules"
            "target/"
          )

          FAILED=0
          for entry in "${REQUIRED[@]}"; do
            if ! grep -qE "$entry" .gitignore; then
              echo "❌ Missing .gitignore entry: $entry"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "✅ All required .gitignore entries present."
